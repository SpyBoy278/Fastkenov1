<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>FastKeno</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#040d1a;
    --panel:#070f22;
    --card:#0a1529;
    --border:#1a3060;
    --gold:#f5c518;
    --gold2:#ffaa00;
    --cyan:#00e5ff;
    --green:#00ff88;
    --red:#ff3b5c;
    --purple:#b344ff;
    --selected:#00e5ff;
    --hit:#f5c518;
    --miss:#1a2a4a;
    --text:#cde4ff;
    --dim:#4a6a99;
    --glow-cyan:0 0 12px #00e5ff88,0 0 24px #00e5ff44;
    --glow-gold:0 0 12px #f5c51888,0 0 24px #f5c51844;
    --glow-green:0 0 12px #00ff8888,0 0 24px #00ff8844;
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    display:flex;flex-direction:column;
    max-width:430px;margin:0 auto;
    position:relative;overflow:hidden;
  }

  /* Stars BG */
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .stars canvas{width:100%;height:100%;}

  /* HEADER */
  .header{
    position:relative;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px 8px;
    background:linear-gradient(180deg,#0a1a3a 0%,transparent 100%);
    border-bottom:1px solid var(--border);
  }
  .logo{
    font-family:'Orbitron',sans-serif;
    font-size:18px;font-weight:900;
    background:linear-gradient(90deg,var(--cyan),var(--gold));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:2px;
  }
  .balance-box{
    display:flex;flex-direction:column;align-items:flex-end;
    background:rgba(0,229,255,0.08);
    border:1px solid rgba(0,229,255,0.2);
    border-radius:8px;padding:4px 10px;
  }
  .balance-label{font-size:10px;color:var(--dim);letter-spacing:1px;}
  .balance-value{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:1px;}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:5;}

  /* TOP INFO BAR */
  .info-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 14px;
    background:rgba(10,20,40,0.8);
    border-bottom:1px solid rgba(26,48,96,0.5);
  }
  .pick-info{
    font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;
  }
  .pick-info span{color:var(--cyan);font-weight:700;font-size:13px;}
  .round-info{font-size:11px;color:var(--dim);}
  .round-info span{color:var(--text);}

  /* GAME AREA */
  .game-area{
    flex:1;display:flex;overflow:hidden;padding:8px 10px 6px;gap:8px;
  }

  /* PAYTABLE */
  .paytable{
    width:72px;flex-shrink:0;
    background:rgba(7,15,34,0.9);
    border:1px solid var(--border);
    border-radius:10px;overflow:hidden;
    display:flex;flex-direction:column;
  }
  .paytable-title{
    font-size:9px;font-weight:700;letter-spacing:1px;
    text-align:center;padding:5px 2px;
    background:rgba(0,229,255,0.12);
    color:var(--cyan);border-bottom:1px solid var(--border);
  }
  .pay-rows{flex:1;overflow-y:auto;scrollbar-width:none;}
  .pay-rows::-webkit-scrollbar{display:none;}
  .pay-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:3px 6px;border-bottom:1px solid rgba(26,48,96,0.4);
    font-size:10px;transition:all 0.2s;
  }
  .pay-row.active{background:rgba(245,197,24,0.15);border-color:rgba(245,197,24,0.3);}
  .pay-row.highlight{background:rgba(0,255,136,0.15);border-color:rgba(0,255,136,0.3);}
  .pay-match{color:var(--dim);font-size:10px;}
  .pay-mult{color:var(--gold);font-weight:700;font-size:10px;}
  .pay-row.active .pay-match{color:var(--gold);}
  .pay-row.highlight .pay-mult{color:var(--green);text-shadow:var(--glow-green);}

  /* GRID AREA */
  .grid-wrap{flex:1;display:flex;flex-direction:column;}
  .keno-grid{
    display:grid;grid-template-columns:repeat(8,1fr);
    gap:4px;flex:1;
  }
  .ball{
    aspect-ratio:1;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
    cursor:pointer;user-select:none;
    border:1.5px solid rgba(26,48,96,0.8);
    background:var(--card);
    color:var(--dim);
    transition:all 0.15s;position:relative;overflow:hidden;
  }
  .ball::before{
    content:'';position:absolute;inset:0;border-radius:7px;
    background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%);
  }
  .ball:hover:not(.drawn):not(.selected-drawn){
    border-color:rgba(0,229,255,0.5);
    color:var(--text);background:#0f1e3d;
    transform:scale(1.05);
  }
  .ball.selected{
    background:linear-gradient(135deg,#003a6a,#005090);
    border-color:var(--cyan);
    color:#fff;
    box-shadow:0 0 10px rgba(0,229,255,0.4),inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .ball.drawn{
    background:linear-gradient(135deg,#2a1800,#3d2200);
    border-color:var(--gold2);
    color:var(--gold);
    animation:drawPulse 0.4s ease;
    box-shadow:0 0 12px rgba(245,197,24,0.4);
  }
  .ball.selected-drawn{
    background:linear-gradient(135deg,#003a20,#005530);
    border-color:var(--green);
    color:#fff;
    box-shadow:0 0 14px rgba(0,255,136,0.5);
    animation:hitPulse 0.5s ease;
  }
  .ball.miss{
    background:rgba(10,20,40,0.4);
    border-color:rgba(26,48,96,0.3);
    color:rgba(74,106,153,0.5);
  }
  @keyframes drawPulse{
    0%{transform:scale(1.3);}100%{transform:scale(1);}
  }
  @keyframes hitPulse{
    0%{transform:scale(1.4);box-shadow:0 0 30px rgba(0,255,136,0.8);}
    100%{transform:scale(1);}
  }

  /* DRAWN NUMBERS */
  .drawn-section{
    margin-top:6px;
    background:rgba(7,15,34,0.9);border:1px solid var(--border);
    border-radius:8px;padding:5px 8px;
  }
  .drawn-label{font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:3px;}
  .drawn-track{display:flex;flex-wrap:wrap;gap:3px;min-height:18px;}
  .drawn-pip{
    width:20px;height:20px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;
  }
  .drawn-pip.hit{background:rgba(0,255,136,0.2);color:var(--green);border:1px solid var(--green);}
  .drawn-pip.miss2{background:rgba(245,197,24,0.1);color:var(--gold2);border:1px solid rgba(245,197,24,0.3);}

  /* BET PANEL */
  .bet-panel{
    position:relative;z-index:10;
    background:linear-gradient(0deg,#050e20 0%,rgba(7,15,34,0.98) 100%);
    border-top:1px solid var(--border);
    padding:10px 14px 12px;
  }
  .bet-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .bet-label{font-size:10px;color:var(--dim);letter-spacing:1px;width:32px;}

  /* Bet amount chips */
  .bet-chips{display:flex;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .bet-chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;padding:4px 8px;border-radius:6px;
    font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;
    border:1.5px solid var(--border);background:var(--card);color:var(--dim);
    cursor:pointer;transition:all 0.15s;
  }
  .chip.active{
    border-color:var(--gold);color:var(--gold);
    background:rgba(245,197,24,0.12);
    box-shadow:var(--glow-gold);
  }

  /* Speed */
  .speed-tabs{display:flex;gap:4px;flex:1;}
  .speed-tab{
    flex:1;padding:5px 2px;border-radius:6px;text-align:center;
    font-size:10px;font-weight:700;letter-spacing:1px;
    border:1.5px solid var(--border);background:var(--card);color:var(--dim);
    cursor:pointer;transition:all 0.15s;
  }
  .speed-tab.active{border-color:var(--purple);color:var(--purple);background:rgba(179,68,255,0.12);}

  /* Action Row */
  .action-row{display:flex;gap:8px;align-items:center;}
  .btn-auto{
    flex:1;padding:10px;border-radius:10px;
    font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;
    border:1.5px solid var(--border);background:var(--card);color:var(--dim);
    cursor:pointer;transition:all 0.2s;
  }
  .btn-auto.active{border-color:var(--purple);color:var(--purple);background:rgba(179,68,255,0.12);}
  .btn-play{
    flex:2;padding:12px;border-radius:10px;
    font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:2px;
    border:none;cursor:pointer;
    background:linear-gradient(135deg,#0090ff,#0055cc);
    color:#fff;
    box-shadow:0 4px 20px rgba(0,144,255,0.4);
    transition:all 0.2s;
    position:relative;overflow:hidden;
  }
  .btn-play::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%);
  }
  .btn-play:active{transform:scale(0.97);}
  .btn-play.drawing{background:linear-gradient(135deg,#ff6600,#cc3300);box-shadow:0 4px 20px rgba(255,102,0,0.4);}
  .btn-play.disabled{opacity:0.4;cursor:not-allowed;}
  .btn-clear{
    flex:1;padding:10px;border-radius:10px;
    font-size:11px;font-weight:700;letter-spacing:1px;
    border:1.5px solid rgba(255,59,92,0.3);background:rgba(255,59,92,0.08);color:var(--red);
    cursor:pointer;transition:all 0.2s;
  }

  /* WIN OVERLAY */
  .win-overlay{
    position:fixed;inset:0;z-index:100;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(4,13,26,0.85);backdrop-filter:blur(6px);
    opacity:0;pointer-events:none;transition:opacity 0.3s;
  }
  .win-overlay.show{opacity:1;pointer-events:all;}
  .win-card{
    background:linear-gradient(135deg,#0a1e3a,#0d2848);
    border:2px solid var(--gold);
    border-radius:20px;padding:30px 40px;text-align:center;
    box-shadow:0 0 60px rgba(245,197,24,0.3);
    animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn{0%{transform:scale(0.6);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .win-label{font-size:12px;color:var(--dim);letter-spacing:3px;margin-bottom:6px;}
  .win-amount{
    font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;
    color:var(--gold);text-shadow:var(--glow-gold);
    margin-bottom:8px;
  }
  .win-matches{font-size:14px;color:var(--text);}
  .win-close{
    margin-top:20px;padding:12px 32px;border-radius:10px;
    font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;
    border:none;background:linear-gradient(135deg,var(--gold2),var(--gold));
    color:#000;cursor:pointer;
  }

  /* Status msg */
  .status-msg{
    text-align:center;font-size:11px;color:var(--dim);
    margin-bottom:6px;height:14px;letter-spacing:1px;
  }
  .status-msg.good{color:var(--green);}
  .status-msg.bad{color:var(--red);}
  .status-msg.info{color:var(--cyan);}
</style>
</head>
<body>

<!-- Stars -->
<div class="stars"><canvas id="starCanvas"></canvas></div>

<!-- Win overlay -->
<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <div class="win-label">YOU WIN</div>
    <div class="win-amount" id="winAmount">$0.00</div>
    <div class="win-matches" id="winMatches">0 of 0 matched</div>
    <button class="win-close" onclick="closeWin()">COLLECT</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">⚡ FASTKENO</div>
  <div class="balance-box">
    <span class="balance-label">BALANCE</span>
    <span class="balance-value" id="balanceVal">$1,000.00</span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Info bar -->
  <div class="info-bar">
    <div class="pick-info">PICKS: <span id="pickCount">0</span>/10 &nbsp; HITS: <span id="hitCount" style="color:var(--green)">0</span></div>
    <div class="round-info">ROUND <span id="roundNum">1</span></div>
  </div>

  <!-- Game area -->
  <div class="game-area">
    <!-- Paytable -->
    <div class="paytable">
      <div class="paytable-title">PICKS<br>PAYS</div>
      <div class="pay-rows" id="payRows"></div>
    </div>

    <!-- Grid -->
    <div class="grid-wrap">
      <div class="keno-grid" id="kenoGrid"></div>
      <div class="drawn-section">
        <div class="drawn-label">DRAWN NUMBERS</div>
        <div class="drawn-track" id="drawnTrack"></div>
      </div>
    </div>
  </div>

  <!-- Bet Panel -->
  <div class="bet-panel">
    <div class="status-msg" id="statusMsg">Select 1–10 numbers to play</div>

    <div class="bet-row">
      <div class="bet-label" style="font-size:9px;color:var(--dim);letter-spacing:1px;width:auto;margin-right:2px;">BET $</div>
      <div class="bet-chips">
        <div class="chip" data-val="0.20">0.20</div>
        <div class="chip" data-val="0.50">0.50</div>
        <div class="chip active" data-val="1.00">1.00</div>
        <div class="chip" data-val="5.00">5.00</div>
        <div class="chip" data-val="10.00">10.00</div>
        <div class="chip" data-val="25.00">25.00</div>
        <div class="chip" data-val="50.00">50.00</div>
      </div>
    </div>

    <div class="bet-row">
      <div class="bet-label" style="font-size:9px;color:var(--dim);letter-spacing:1px;width:auto;margin-right:6px;">SPEED</div>
      <div class="speed-tabs">
        <div class="speed-tab" data-ms="600">SLOW</div>
        <div class="speed-tab active" data-ms="200">FAST</div>
        <div class="speed-tab" data-ms="50">TURBO</div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-clear" onclick="clearPicks()">CLEAR</button>
      <button class="btn-play" id="playBtn" onclick="startGame()">PLAY</button>
      <button class="btn-auto" id="autoBtn" onclick="toggleAuto()">AUTO</button>
    </div>
  </div>
</div>

<script>
// ===== STARS =====
(function(){
  const c=document.getElementById('starCanvas');
  const ctx=c.getContext('2d');
  let stars=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  function init(){
    stars=[];
    for(let i=0;i<150;i++){
      stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5,a:Math.random(),d:Math.random()*0.005+0.001});
    }
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.d;if(s.a>1||s.a<0)s.d*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,220,255,${s.a*0.7})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();init();draw();
  window.addEventListener('resize',()=>{resize();init();});
})();

// ===== GAME STATE =====
const PAYTABLES = {
  1:[0,3.5],
  2:[0,0,5],
  3:[0,0,2,8],
  4:[0,0,1,4,20],
  5:[0,0,0,3,8,50],
  6:[0,0,0,2,5,20,100],
  7:[0,0,0,0,3,8,30,200],
  8:[0,0,0,0,2,5,20,80,500],
  9:[0,0,0,0,1,3,10,40,150,1000],
  10:[0,0,0,0,1,2,5,20,60,300,2000],
};

let balance=1000;
let betAmount=1.00;
let picks=new Set();
let drawnNums=[];
let round=1;
let isDrawing=false;
let drawSpeed=200;
let autoPlay=false;
let autoTimer=null;

function fmt(v){return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

// Build grid
const grid=document.getElementById('kenoGrid');
for(let i=1;i<=80;i++){
  const b=document.createElement('div');
  b.className='ball';b.textContent=i;b.dataset.n=i;
  b.addEventListener('click',()=>togglePick(i,b));
  grid.appendChild(b);
}

function getBall(n){return grid.querySelector(`[data-n="${n}"]`);}

function togglePick(n,el){
  if(isDrawing)return;
  if(picks.has(n)){picks.delete(n);el.className='ball';}
  else{
    if(picks.size>=10){setStatus('Max 10 picks!','bad');return;}
    picks.add(n);el.className='ball selected';
  }
  updatePickCount();
  updatePaytable();
}

function clearPicks(){
  if(isDrawing)return;
  picks.forEach(n=>{getBall(n).className='ball';});
  picks.clear();
  updatePickCount();
  updatePaytable();
  setStatus('Select 1–10 numbers to play','');
}

function updatePickCount(){
  document.getElementById('pickCount').textContent=picks.size;
}

function setStatus(msg,type=''){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;el.className='status-msg'+(type?' '+type:'');
}

// Paytable
function updatePaytable(){
  const rows=document.getElementById('payRows');
  rows.innerHTML='';
  const n=picks.size;
  if(n===0){rows.innerHTML='<div style="padding:8px 6px;font-size:9px;color:#4a6a99;text-align:center;">Pick<br>numbers</div>';return;}
  const table=PAYTABLES[n];
  for(let m=n;m>=0;m--){
    const row=document.createElement('div');
    row.className='pay-row';row.dataset.match=m;
    const mult=table[m]||0;
    row.innerHTML=`<span class="pay-match">${m}/${n}</span><span class="pay-mult">${mult>0?mult+'x':'—'}</span>`;
    rows.appendChild(row);
  }
}

function highlightPayrow(matches){
  document.querySelectorAll('.pay-row').forEach(r=>{
    r.classList.remove('active','highlight');
    if(parseInt(r.dataset.match)===matches){
      const mult=PAYTABLES[picks.size]?.[matches]||0;
      r.classList.add(mult>0?'highlight':'active');
    }
  });
}

// DRAW
async function startGame(){
  if(isDrawing)return;
  if(picks.size===0){setStatus('Pick at least 1 number!','bad');return;}
  if(balance<betAmount){setStatus('Insufficient balance!','bad');return;}

  isDrawing=true;
  balance-=betAmount;
  updateBalance();
  document.getElementById('playBtn').textContent='DRAWING...';
  document.getElementById('playBtn').classList.add('drawing');
  document.getElementById('hitCount').textContent='0';

  // Reset grid
  picks.forEach(n=>{getBall(n).className='ball selected';});
  document.querySelectorAll('.ball.drawn,.ball.selected-drawn,.ball.miss').forEach(b=>{
    const n=parseInt(b.dataset.n);
    if(picks.has(n))b.className='ball selected';else b.className='ball';
  });
  document.getElementById('drawnTrack').innerHTML='';
  drawnNums=[];

  // Generate 20 draws
  const pool=[];for(let i=1;i<=80;i++)pool.push(i);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const draws=pool.slice(0,20);

  let hits=0;
  for(let i=0;i<draws.length;i++){
    const n=draws[i];
    drawnNums.push(n);
    const ball=getBall(n);
    const isHit=picks.has(n);
    ball.className=isHit?'ball selected-drawn':'ball drawn';

    // pip
    const pip=document.createElement('div');
    pip.className='drawn-pip '+(isHit?'hit':'miss2');
    pip.textContent=n;
    document.getElementById('drawnTrack').appendChild(pip);
    if(isHit){hits++;document.getElementById('hitCount').textContent=hits;}

    await sleep(drawSpeed);
  }

  // Gray out undrawn, unselected
  for(let i=1;i<=80;i++){
    const b=getBall(i);
    if(!b.classList.contains('drawn')&&!b.classList.contains('selected-drawn')&&!picks.has(i)){
      b.className='ball miss';
    }
  }

  // Payout
  const table=PAYTABLES[picks.size];
  const mult=table?.[hits]||0;
  const win=parseFloat((betAmount*mult).toFixed(2));
  highlightPayrow(hits);

  if(win>0){
    balance+=win;updateBalance();
    setTimeout(()=>showWin(win,hits),300);
    setStatus(`${hits} MATCH${hits!==1?'ES':''} — WIN ${fmt(win)}`,'good');
  } else {
    setStatus(`${hits} match${hits!==1?'es':''} — better luck next time!`,'bad');
  }

  round++;document.getElementById('roundNum').textContent=round;
  isDrawing=false;
  document.getElementById('playBtn').textContent='PLAY';
  document.getElementById('playBtn').classList.remove('drawing');

  if(autoPlay&&!autoTimer){
    autoTimer=setTimeout(()=>{autoTimer=null;if(autoPlay)startGame();},1200);
  }
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
